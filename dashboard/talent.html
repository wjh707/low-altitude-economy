  .loader-text { margin-top: 16px; color: #5f6368; font-size: 14px; }

  /* Header */

    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  .header-inner {
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  .header h1 { font-size: 22px; font-weight: 600; letter-spacing: 0.5px; }
  .header .subtitle { font-size: 13px; opacity: 0.85; margin-top: 2px; }
  .header-right { text-align: right; font-size: 12px; opacity: 0.8; }
  .header-nav { display: flex; gap: 16px; margin-top: 8px; }
  .header-nav a {
    color: rgba(255,255,255,0.8);
    padding: 4px 12px;
    border-radius: 4px;
    font-size: 13px;
    transition: all 0.2s;
  }
  .header-nav a:hover { background: rgba(255,255,255,0.15); text-decoration: none; }
  .header-nav a.active { background: rgba(255,255,255,0.2); color: #fff; font-weight: 600; }

  /* Container */
  .container { max-width: 1400px; margin: 0 auto; padding: 20px 24px; }

  /* Stats cards */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 20px;
  }
  .stat-card {
    background: #fff;
    border-radius: 10px;
    padding: 20px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    border-left: 4px solid #1a73e8;

  .stat-card:nth-child(1) { border-left-color: #1a73e8; }

  .stat-card:nth-child(2) { border-left-color: #34a853; }
  .stat-card:nth-child(2) .value { color: #34a853; }
  .stat-card:nth-child(3) { border-left-color: #fbbc04; }
  .stat-card:nth-child(3) .value { color: #fbbc04; }
  .stat-card:nth-child(4) { border-left-color: #ea4335; }
  .stat-card:nth-child(4) .value { color: #ea4335; }

  .chart-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 20px;
  }
  .chart-box {
    background: #fff;
    border-radius: 10px;
    padding: 16px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .chart-box h3 {
    font-size: 15px;
    font-weight: 600;
    color: #333;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 2px solid #e8eaed;
  }
  .chart-box .chart { width: 100%; height: 340px; }
  .chart-full {
    grid-column: 1 / -1;
  }
  .chart-full .chart { height: 300px; }

  /* Error */
  .error-msg {
    background: #fce8e6;
    color: #c5221f;
    padding: 14px 20px;
    border-radius: 8px;
    margin: 20px 0;
    font-size: 14px;
  }

  .table-controls {

    gap: 12px;
    margin-bottom: 12px;
    flex-wrap: wrap;

    font-size: 13px;
